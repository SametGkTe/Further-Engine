name: Build
on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      setupCommand:
        required: true
        type: string
      buildArgs:
        required: true
        type: string
      artifactName:
        required: true
        type: string
      artifactPath:
        required: true
        type: string

env:
  HAXE_VERSION: 4.3.6
  PROJECT_NAME: PsychEngine

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Setup Android NDK
        if: inputs.name == 'Android'
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25b
          add-to-path: false

      - name: Install libVLC
        if: contains(inputs.name, 'Linux')
        run: sudo apt update && sudo apt install -y libvlc-dev libvlccore-dev

      - name: Install Libraries
        run: |
          ${{ inputs.setupCommand }}
          echo "=== Haxe Version ==="
          haxe -version
          echo "=== Haxelib List ==="
          haxelib list

      - name: Configure Android
        if: inputs.name == 'Android'
        shell: bash
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT ${{ steps.setup-ndk.outputs.ndk-path }}

          if [ "$RUNNER_ARCH" = "ARM64" ]; then
            echo "Using ARM64 Java"
            haxelib run lime config JAVA_HOME $JAVA_HOME_17_arm64
          else
            echo "Using X64 Java"
            haxelib run lime config JAVA_HOME $JAVA_HOME_17_X64
          fi

          haxelib run lime config ANDROID_SETUP true

      - name: Restore Compile Cache
        if: inputs.name != 'Android' && inputs.name != 'iOS'
        id: compile-cache
        uses: actions/cache@v4
        with:
          path: |
            export/release/${{ inputs.name == 'Windows' && 'windows' || inputs.name == 'Linux' && 'linux' || inputs.name == 'Android' && 'android' || inputs.name == 'iOS' && 'ios' || 'macos' }}/obj
          key: compile-${{ inputs.os }}-${{ inputs.buildArgs }}-${{ hashFiles('source/**', 'assets/**', '*.hx', '*.hxml', 'Project.xml', 'setup/**') }}
          restore-keys: |
            compile-${{ inputs.os }}-${{ inputs.buildArgs }}-

      - name: Clean Android
        if: inputs.name == 'Android'
        run: haxelib run lime clean android || true

      - name: Clean iOS
        if: inputs.name == 'iOS'
        run: haxelib run lime clean ios || true

      - name: Compile
        run: haxelib run lime build ${{ inputs.buildArgs }}

      - name: Make IPA
        if: inputs.name == 'iOS'
        run: |
          brew install ldid
          cd export/release/ios/build/Release-iphoneos/${{ env.PROJECT_NAME }}.app
          ldid -S../../../${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.entitlements ${{ env.PROJECT_NAME }}
          cd ..
          mkdir Payload
          mv ${{ env.PROJECT_NAME }}.app Payload
          zip -r ${{ env.PROJECT_NAME }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifactName }}
          path: ${{ inputs.artifactPath }}
          if-no-files-found: error