name: Build
on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      setupCommand:
        required: true
        type: string
      buildArgs:
        required: true
        type: string
      artifactName:
        required: true
        type: string
      artifactPath:
        required: true
        type: string
env:
  HAXE_VERSION: 4.3.6
  PROJECT_NAME: PsychEngine
jobs:
  build:
    name: Build
    runs-on: ${{ inputs.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Setup Haxe
        uses: krdlab/setup-haxe@master
        with:
          haxe-version: ${{ env.HAXE_VERSION }}

      - name: Setup Android NDK
        if: inputs.name == 'Android'
        id: setup-ndk
        uses: nttld/setup-ndk@main
        with:
          ndk-version: r27c
          add-to-path: false

      - name: Install libVLC
        if: contains(inputs.name, 'Linux')
        run: sudo apt install libvlc-dev libvlccore-dev

      - name: Install Libraries
        run: ${{ inputs.setupCommand }}

      - name: Configure Android
        if: inputs.name == 'Android'
        run: |
          haxelib run lime config ANDROID_SDK $ANDROID_HOME
          haxelib run lime config ANDROID_NDK_ROOT ${{ steps.setup-ndk.outputs.ndk-path }}
          haxelib run lime config JAVA_HOME $JAVA_HOME_17_arm64
          haxelib run lime config ANDROID_SETUP true

      # Sadece hxcpp'nin ürettiği C++ obj dosyalarını cache'liyoruz.
      # Setup, haxelib, kütüphaneler bu cache'e dahil DEĞİL.
      # Cache key: os + buildArgs + kaynak kod hash'i
      # Kaynak kod değişince hash değişir → cache otomatik geçersiz olur.
      - name: Restore Compile Cache
        id: compile-cache
        uses: actions/cache@v4
        with:
          path: |
            export/release/${{ inputs.name == 'Windows' && 'windows' || inputs.name == 'Linux' && 'linux' || inputs.name == 'Android' && 'android' || inputs.name == 'iOS' && 'ios' || 'macos' }}/obj
          key: compile-${{ inputs.os }}-${{ inputs.buildArgs }}-${{ hashFiles('source/**', 'assets/**', '*.hx', '*.hxml', 'Project.xml') }}
          restore-keys: |
            compile-${{ inputs.os }}-${{ inputs.buildArgs }}-

      - name: Compile
        run: haxelib run lime build ${{ inputs.buildArgs }}

      - name: Make IPA
        if: inputs.name == 'iOS'
        run: |
          brew install ldid
          cd export/release/ios/build/Release-iphoneos/${{ env.PROJECT_NAME }}.app
          ldid -S../../../${{ env.PROJECT_NAME }}/${{ env.PROJECT_NAME }}.entitlements ${{ env.PROJECT_NAME }}
          cd ..
          mkdir Payload
          mv ${{ env.PROJECT_NAME }}.app Payload
          zip -r ${{ env.PROJECT_NAME }}.ipa Payload

      - name: Upload Artifact
        uses: actions/upload-artifact@main
        with:
          name: ${{ inputs.artifactName }}
          path: ${{ inputs.artifactPath }}
          if-no-files-found: error